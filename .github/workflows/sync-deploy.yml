name: Sync to Vercel Deploy Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to deploy repo
        env:
          TARGET_REPO: https://x-access-token:${{ secrets.VERCEL_DEPLOY_TOKEN }}@github.com/cxw745/runguide-vercel.git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add deploy "$TARGET_REPO"

          git push deploy HEAD:main --force
